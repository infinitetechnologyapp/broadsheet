<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link rel="icon" href="schoolNova.png" type="image/broadsheet-icon" />
  <link rel="stylesheet" href="./style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-logo"><img src="schoolNova2.png" alt="SN" /></div>
    <h2 class="login-title">SchoolNova</h2>
    <p class="login-sub">Building Records that Last Forever</p>

    <!-- Tabs -->
    <div style="display:flex;gap:0;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1.5px solid var(--border)">
      <button id="tabLoginBtn" onclick="switchTab('login')" style="flex:1;padding:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;border:none;background:var(--primary);color:#fff;cursor:pointer">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
      <button id="tabSignupBtn" onclick="switchTab('signup')" style="flex:1;padding:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;border:none;background:#f1f5f9;color:var(--text-muted);cursor:pointer">
        <i class="bi bi-person-plus-fill"></i> Sign Up
      </button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="adminEmail" class="form-control" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" id="togglePw"><i class="bi bi-eye-slash"></i></button>
        </div>
      </div>
      <div id="loginError" class="alert alert-error mb-2 hidden">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="loginErrorMsg">Invalid credentials.</span>
      </div>
      <button class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:4px">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </div>

    <!-- SIGN UP FORM -->
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label class="form-label">Full Name <span style="color:red">*</span></label>
        <input type="text" id="signupName" class="form-control" placeholder="e.g. Adaeze Okonkwo"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address <span style="color:red">*</span></label>
        <input type="email" id="signupEmail" class="form-control" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span style="color:red">*</span></label>
        <div class="input-wrap">
          <input type="password" id="signupPassword" class="form-control" placeholder="Min. 6 characters"/>
          <button type="button" class="toggle-pw" id="toggleSignupPw"><i class="bi bi-eye-slash"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password <span style="color:red">*</span></label>
        <input type="password" id="signupConfirm" class="form-control" placeholder="Repeat password"/>
      </div>
      <div id="signupError" class="alert alert-error mb-2 hidden">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="signupErrorMsg">Error.</span>
      </div>
      <div id="signupSuccess" class="alert alert-success mb-2 hidden">
        <i class="bi bi-check-circle-fill"></i>
        <span>Account created! Please wait for the Admin to assign your role before logging in.</span>
      </div>
      <button class="btn btn-success" id="signupBtn" style="width:100%;margin-top:4px">
        <i class="bi bi-person-plus-fill"></i> Create Account
      </button>
      <p style="font-size:.78rem;color:var(--text-muted);text-align:center;margin-top:12px">
        After signing up, your account needs Admin approval before you can access the system.
      </p>
    </div>

    <div style="text-align:center;margin-top:20px">
      <a href="./index.html" style="font-size:.82rem;color:var(--text-muted);font-weight:600">
        <i class="bi bi-arrow-left"></i> Back to Home
      </a>
    </div>

  </div>
</div>

<script type="module" src="admin-login.js"></script>
</body>
</html>
